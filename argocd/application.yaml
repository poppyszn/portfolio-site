apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io   # lets ArgoCD clean up on app deletion
spec:
  project: default

  source:
    repoURL: https://github.com/poppyszn/portfolio-site   # update to your repo URL
    targetRevision: HEAD
    path: helm/portfolio
    helm:
      values: |
        imagePullSecrets:
          - name: harbor-creds
        ingress:
          host: dev-pops.site
          className: traefik

  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio

  syncPolicy:
    automated:
      prune: true       # delete resources removed from git
      selfHeal: true    # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true   # auto-creates the portfolio namespace
