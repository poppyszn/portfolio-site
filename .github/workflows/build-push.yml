name: Build & Push to Harbor

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package*.json'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'helm/portfolio/templates/**'

jobs:
  build-push:
    name: Build and push image
    runs-on: self-hosted
    permissions:
      contents: write   # needed to push the image tag commit back to git

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASSWORD }}
        run: echo "$HARBOR_PASS" | docker login harbor.dev-pops.site -u "$HARBOR_USER" --password-stdin

      - name: Build image
        run: |
          docker build -t harbor.dev-pops.site/homelab/portfolio:${{ steps.sha.outputs.short }} \
                       -t harbor.dev-pops.site/homelab/portfolio:latest \
                       .

      - name: Push image
        run: |
          docker push harbor.dev-pops.site/homelab/portfolio:${{ steps.sha.outputs.short }}
          docker push harbor.dev-pops.site/homelab/portfolio:latest

      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag: .*|tag: ${{ steps.sha.outputs.short }}|" helm/portfolio/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/portfolio/values.yaml
          git diff --staged --quiet || git commit -m "chore: deploy portfolio@${{ steps.sha.outputs.short }} [skip ci]"
          git push
