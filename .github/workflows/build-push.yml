name: Build & Push to Harbor

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package*.json'
      - 'Dockerfile'
      - 'nginx.conf'

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the image tag commit back to git

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.dev-pops.site
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            harbor.dev-pops.site/homelab/portfolio:latest
            harbor.dev-pops.site/homelab/portfolio:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in ArgoCD manifest
        run: |
          sed -i "s|tag: .*|tag: ${{ steps.sha.outputs.short }}|" argocd/application.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/application.yaml
          git diff --staged --quiet || git commit -m "chore: deploy portfolio@${{ steps.sha.outputs.short }} [skip ci]"
          git push
