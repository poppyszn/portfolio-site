apiVersion: v1
kind: Service
metadata:
  name: {{ include "portfolio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "portfolio.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: 9113
      targetPort: metrics
      protocol: TCP
    {{- end }}
    {{- if .Values.appMetrics.enabled }}
    - name: app-metrics
      port: 3001
      targetPort: app-metrics
      protocol: TCP
    {{- end }}
